# ============================================================
# Conexao com o banco de dados PostgreSQL
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/estoque_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate
# validate: o Hibernate NAO altera o schema, apenas confere se as
# entidades batem com as tabelas criadas pelo dump_estoque.sql
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# Servidor
# ============================================================
server.port=8080

# ============================================================
# CORS sera configurado via WebMvcConfigurer no Dia 3,
# liberando origem http://localhost:4200 (Angular)
# ============================================================
